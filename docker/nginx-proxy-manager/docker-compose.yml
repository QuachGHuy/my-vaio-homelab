services:
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - '80:80'      
      - '443:443'    
      - '81:81'      
    environment:
      TZ: "Your_Timezone"  # <-- Replace with your timezone, e.g., "America/New_York"
    networks:
      - proxy
    volumes:
      - ./data:/data           
      - ./letsencrypt:/etc/letsencrypt   

networks:
  proxy:
    external: true
    